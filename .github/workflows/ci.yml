name: CI

on:
  push:
  pull_request:

jobs:
  validate-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate skill shape
        run: |
          test -f vps-proxy-deploy/SKILL.md
          test -f vps-proxy-deploy/agents/openai.yaml
          python - <<'PY'
          from pathlib import Path
          text = Path("vps-proxy-deploy/SKILL.md").read_text(encoding="utf-8")
          assert text.startswith("---\n"), "SKILL.md must start with YAML frontmatter"
          head = text.split("---", 2)[1]
          assert "name: vps-proxy-deploy" in head
          assert "description:" in head
          assert "Cloudflare" in head and "WARP" in head and "Xray" in head
          PY
      - name: Python syntax
        run: python -m compileall vps-proxy-deploy/scripts
      - name: Shell syntax
        run: bash -n vps-proxy-deploy/scripts/*.sh
      - name: Smoke test render and doctor
        run: |
          python vps-proxy-deploy/scripts/render_config.py --init config.yaml
          python vps-proxy-deploy/scripts/render_config.py --config config.yaml --out out
          test -f out/xray-config.json
          test -f out/worker.js
          test -f out/clash-verge.yaml
          test -f out/v2rayn-link.txt
          python vps-proxy-deploy/scripts/doctor.py --config config.yaml
      - name: Secret scan public docs
        run: |
          python vps-proxy-deploy/scripts/redact.py README.md --check
          python vps-proxy-deploy/scripts/redact.py vps-proxy-deploy/SKILL.md --check
          python vps-proxy-deploy/scripts/redact.py vps-proxy-deploy/references/security.md --check
          python vps-proxy-deploy/scripts/redact.py vps-proxy-deploy/references/social-posts.md --check
