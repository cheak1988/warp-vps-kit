# Copy to config.yaml and replace the placeholders.
domain: example.com
proxy_subdomain: ws
config_subdomain: cfg
vps_host: 1.2.3.4
vless_uuid: VLESS_UUID_HERE
ws_path: /ws
client_name: MyVPS

