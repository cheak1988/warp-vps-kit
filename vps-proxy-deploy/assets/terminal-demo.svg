  <circle cx="76" cy="52" r="7" fill="#F59E0B"/>
  <circle cx="100" cy="52" r="7" fill="#10B981"/>
  <text x="128" y="58" fill="#CBD5E1" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">vps-proxy-deploy skill</text>

  <text x="52" y="102" fill="#22C55E" font-size="19" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">$ python scripts/render_config.py --config config.yaml --out out</text>
  <text x="72" y="138" fill="#E5E7EB" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">✓ rendered xray-config.json</text>
