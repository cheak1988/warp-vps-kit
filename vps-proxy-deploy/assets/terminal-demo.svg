  <text x="72" y="202" fill="#E5E7EB" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">✓ rendered clash-verge.yaml</text>
  <text x="72" y="234" fill="#E5E7EB" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">✓ rendered v2rayn-link.txt</text>

  <rect x="52" y="268" width="816" height="166" rx="8" fill="#0F172A" stroke="#334155"/>
  <text x="82" y="306" fill="#93C5FD" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Client</text>
  <text x="172" y="306" fill="#64748B" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">→</text>
  <text x="212" y="306" fill="#FBBF24" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Cloudflare CDN</text>
  <text x="390" y="306" fill="#64748B" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">→</text>
  <text x="430" y="306" fill="#A7F3D0" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">VPS origin</text>
  <text x="560" y="306" fill="#64748B" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">→</text>
  <text x="600" y="306" fill="#C4B5FD" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">WARP SOCKS5</text>
  <text x="82" y="346" fill="#94A3B8" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">hide origin IP</text>
  <text x="286" y="346" fill="#94A3B8" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">recover broken direct access</text>
  <text x="578" y="346" fill="#94A3B8" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">accelerate outbound path</text>

  <text x="82" y="396" fill="#22C55E" font-size="17" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">$ python scripts/doctor.py --config config.yaml</text>
