<svg width="920" height="520" viewBox="0 0 920 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">vps-proxy-deploy skill demo</title>
  <desc id="desc">A terminal style demo showing Cloudflare CDN ingress, VPS origin, WARP outbound, and generated client configs.</desc>
